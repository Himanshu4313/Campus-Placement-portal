version: '3.8'

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
      - MONGODB_URI=mongodb://mongodb:27017/campus_placement
      - JWT_ACCESS_SECRET=your_super_secret_access_token_key_here_make_it_long
      - JWT_REFRESH_SECRET=your_super_secret_refresh_token_key_here_make_it_long
      - JWT_ACCESS_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - OTP_EXPIRE_MINUTES=10
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
